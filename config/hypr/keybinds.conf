$mainMod = SUPER
$terminal = kitty
$fileManager = nautilus

## Applications

# Open Terminal
bind = $mainMod, Return, exec, $terminal
# Open Floating Terminal
bind = $mainMod SHIFT, Return, exec, kitty --class kitty-floating
# Open File Manager
bind = $mainMod, E, exec, $fileManager

## Window Management

# Close Active Window
bind = $mainMod, Q, killactive,
# Exit Hyprland
bind = $mainMod, M, exit,
# Lock Screen
bind = $mainMod, L, exec, hyprlock
# Toggle Floating Mode
bind = $mainMod, W, togglefloating, 
# Toggle Fullscreen
bind = $mainMod, F, fullscreen, 1
# Pseudo Tiling Layout
bind = $mainMod, P, pseudo,
# Toggle Split Direction
bind = $mainMod, J, togglesplit,
# Center Floating Window
bind = $mainMod, C, centerwindow
# Pin Window on All Workspaces
bind = $mainMod SHIFT, P, pin
# Minimize Window to Scratchpad
bind = $mainMod, N, movetoworkspacesilent, special:minimized
# Restore Minimized Windows
bind = $mainMod SHIFT, N, togglespecialworkspace, minimized

## Tools

# Pick Color
bind = $mainMod SHIFT, C, exec, hyprpicker -a
# Switch Keyboard Layout
bind = $mainMod, SPACE, exec, $HOME/.config/quickshell/Scripts/toggle_kb_layout.sh

## Quickshell Widgets

# Open App Launcher
bind = $mainMod, A, exec, socat - UNIX-CONNECT:/tmp/quickshell_launcher
# Open Clipboard History
bind = $mainMod, V, exec, socat - UNIX-CONNECT:/tmp/quickshell_clipboard
# Open Wallpaper Picker
bind = CTRL ALT, W, exec, socat - UNIX-CONNECT:/tmp/quickshell_wallpaper
# Take Screenshot
bind = CTRL ALT, S, exec, socat - UNIX-CONNECT:/tmp/quickshell_screenshot
# Keybinds Cheat Sheet
bind = $mainMod, K, exec, socat - UNIX-CONNECT:/tmp/quickshell_keybinds

## Window Groups

# Create / Dissolve Group
bind = $mainMod, G, togglegroup
# Cycle Group Windows
bind = $mainMod, Tab, changegroupactive, f
# Lock / Unlock Group
bind = $mainMod SHIFT, G, lockactivegroup, toggle

## Navigation

# Move Focus ←→↑↓
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move Window Position ←→↑↓
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Resize Active Window ←→↑↓
binde = $mainMod ALT, right, resizeactive, 10 0
binde = $mainMod ALT, left, resizeactive, -10 0
binde = $mainMod ALT, up, resizeactive, 0 -10
binde = $mainMod ALT, down, resizeactive, 0 10

# Swap Window Position ←→↑↓
bind = $mainMod ALT SHIFT, left, swapwindow, l
bind = $mainMod ALT SHIFT, right, swapwindow, r
bind = $mainMod ALT SHIFT, up, swapwindow, u
bind = $mainMod ALT SHIFT, down, swapwindow, d

## Workspaces

# Switch to Workspace 1..0
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Send Window to Workspace 1..0
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Previous / Next Workspace
bind = CTRL $mainMod, left, workspace, -1
bind = CTRL $mainMod, right, workspace, +1

# Scroll Through Workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Toggle Scratchpad
bind = $mainMod, S, togglespecialworkspace, magic
# Send to Scratchpad
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

## Mouse Binds

# Drag to Move Window
bindm = $mainMod, mouse:272, movewindow
# Drag to Resize Window
bindm = $mainMod, mouse:273, resizewindow
